<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="google-site-verification" content="BhUSIxWSG9CjYoRW0C5kNZGZuHD5zx63MOFOAWTaGOI" />
    <meta name="description" content="Blixtro is the official Inventory Management System for SFS College. Manage room bookings, issues, and stock requests efficiently.">
    <title>Blixtro {% block title %}{% endblock title %}</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/logo-icon.svg' %}">
    <script src="{% static 'utils/htmx/htmx.min.js' %}"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link href="{% static 'utils/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <script src="{% static 'utils/mobile-utils.js' %}?v=3"></script>
    <style>
    :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
    }
    body {
        padding-top: var(--sat);
        padding-bottom: var(--sab);
    }
    /* ── Universal back-btn ─────────────────────────────────── */
    .universal-back-btn {
      position: fixed;
      top: calc(72px + var(--sat));
      right: max(16px, env(safe-area-inset-right, 16px));
      padding: 8px 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 13px;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
      z-index: 1005;
      transition: opacity 0.2s ease, transform 0.2s ease;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .universal-back-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(99,102,241,0.35); color: white; text-decoration: none; }
    .universal-back-btn .material-symbols-outlined { font-size: 18px; }
    @media (max-width: 900px) {
      .universal-back-btn { top: calc(60px + var(--sat)); right: max(12px, env(safe-area-inset-right, 12px)); padding: 7px 12px; font-size: 12px; gap: 5px; }
      .universal-back-btn .material-symbols-outlined { font-size: 16px; }
    }
    @media (max-width: 768px) {
      body { padding-bottom: calc(90px + var(--sab)) !important; }
    }
    </style>
    {% block style %}{% endblock style %}
</head>

<body class="bg-light">
    <div class="initial-wrap">
        
        <!-- Navbar -->
        {% block navbar %}{% endblock navbar %}

        <!-- Main Content -->
        <section class="main-content">
            <div class="container">
                {% block content %}{% endblock %}
            </div>
        </section>

    </div>
    {% block scripts %}{% endblock scripts %}
    <script src="{% static 'utils/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>

</html>
