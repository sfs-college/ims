{% load static %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');

  :root {
    --nb-h: 75px;
    --nb-bg: #ffffff;
    --nb-border: rgba(0, 0, 0, 0.07);
    --nb-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
    --nb-accent: #6c63ff;
    --nb-accent-lt: #a89dff;
  }

  /* ── Fixed topbar shell ──────────────────────────────────────────── */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nb-h);
    background: var(--nb-bg);
    border-bottom: 1px solid var(--nb-border);
    box-shadow: var(--nb-shadow);
    z-index: 1001;
    font-family: 'DM Sans', sans-serif;
  }

  .header-content {
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 18px 0 14px;
    gap: 12px;
  }

  /* ── Hamburger ───────────────────────────────────────────────────── */
  .nb-menu-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    background: #f4f6fb;
    border: 1px solid rgba(108, 99, 255, 0.16);
    border-radius: 9px;
    cursor: pointer;
    color: var(--nb-accent);
    flex-shrink: 0;
    transition: background 0.16s, box-shadow 0.16s, transform 0.14s;
    padding: 0;
  }
  .nb-menu-btn:hover {
    background: rgba(108, 99, 255, 0.09);
    box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.11);
    transform: scale(1.04);
  }
  .nb-menu-btn:active { transform: scale(0.96); }
  .nb-menu-btn .material-symbols-outlined {
    font-size: 20px;
    line-height: 1;
    user-select: none;
  }

  /* ── Logo ────────────────────────────────────────────────────────── */
  .logo {
    display: flex;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }
  .logo img {
    height: 100px !important;
    width: auto;
    display: block;
    max-width: 320px;
    object-fit: contain;
  }

  /* ── Mobile: shrink logo so it fits inside the 75px navbar ── */
  @media (max-width: 768px) {
    .logo img {
      height: 52px !important;
      max-width: 160px !important;
    }
    .header-content {
      padding: 0 12px 0 10px;
      gap: 8px;
    }
    .nb-room-switcher .btn {
      font-size: 0.7rem;
      padding: 5px 10px;
    }
  }

  /* ── Spacer ──────────────────────────────────────────────────────── */
  .nb-spacer { flex: 1; min-width: 0; }

  /* ── Room switcher dropdown ──────────────────────────────────────── */
  .nb-room-switcher .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    background: #0f172a;
    color: #fff;
    border: none;
    border-radius: 9px;
    padding: 6px 14px;
    letter-spacing: 0.2px;
    transition: background 0.15s;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nb-room-switcher .btn:hover { background: #1e293b; }
  .nb-room-switcher .dropdown-menu {
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.08);
    box-shadow: 0 10px 28px rgba(0,0,0,0.1);
    padding: 6px 0;
    min-width: 200px;
    max-width: 280px;
    max-height: min(60vh, 360px);
    overflow-y: auto;
    overflow-x: hidden;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
  }
  .nb-room-switcher .dropdown-menu::-webkit-scrollbar { width: 6px; }
  .nb-room-switcher .dropdown-menu::-webkit-scrollbar-track { background: #f8fafc; border-radius: 999px; }
  .nb-room-switcher .dropdown-menu::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 999px;
  }
  .nb-room-switcher .dropdown-item {
    padding: 8px 16px;
    font-weight: 500;
    color: #334155;
    border-radius: 0;
    transition: background 0.12s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nb-room-switcher .dropdown-item:hover { background: #f8fafc; color: #1e293b; }
  .nb-room-switcher .dropdown-item.active {
    background: rgba(108,99,255,0.1);
    color: var(--nb-accent);
    font-weight: 600;
  }

  /* ── Right-side actions ──────────────────────────────────────────── */
  .nb-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Direct Premium Profile & Logout Button ─────────────────────── */
  .nb-avatar-wrap img {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #6c63ff;
    display: block;
  }
  .nb-logout-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: #fef2f2;
    border: 1px solid #fee2e2;
    border-radius: 12px;
    color: #dc2626;
    font-weight: 600;
    font-size: 13px;
    text-decoration: none !important;
    transition: all 0.2s ease;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .nb-logout-btn:hover {
    background: #dc2626;
    color: #ffffff;
    border-color: #dc2626;
    box-shadow: 0 4px 12px rgba(220, 38, 38, 0.25);
    transform: translateY(-1px);
  }
  .nb-logout-btn:active {
    transform: translateY(0);
  }
  .nb-logout-btn .material-symbols-outlined {
    font-size: 18px;
  }

  @media (max-width: 768px) {
    .nb-avatar-wrap {
      display: none; /* Hide avatar on mobile to save space */
    }
    .nb-logout-btn {
      padding: 8px;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      justify-content: center;
    }
    .nb-logout-btn .logout-text {
      display: none;
    }
  }

  /* ── Body offset so content isn't hidden under fixed header ─────── */
  body { padding-top: calc(var(--nb-h) + var(--sat, 0px)) !important; }
</style>

<header class="header" style="top: var(--sat, 0px);">
  <div class="header-content w-100">

    <button class="nb-menu-btn" onclick="if(typeof toggleSidebar==='function') toggleSidebar();" aria-label="Toggle sidebar">
      <span class="material-symbols-outlined">menu</span>
    </button>

    <!-- Logo -->
    <div class="logo" style="margin-left: -10px; padding-left: 0;">
      <img src="{% static 'images/blixtro.svg' %}" alt="Blixtro" style="height: 100px; width: auto; max-width: 320px; margin-left: 0; display: block; object-fit: contain;">
    </div>

    <div class="nb-spacer"></div>

    <!-- Right side -->
    <div class="nb-actions">

      <!-- Room Switcher  -->
      {% if request.user.is_authenticated and request.user.profile.rooms_incharge.all %}
      <div class="nb-room-switcher dropdown">
        <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          {% with current_room=request.resolver_match.kwargs.room_slug %}
            {% for room in request.user.profile.rooms_incharge.all %}
              {% if room.slug == current_room %}{% if room.label %}{{ room.label }} — {% endif %}{{ room.room_name }}{% endif %}
            {% endfor %}
          {% endwith %}
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
          {% for room in request.user.profile.rooms_incharge.all %}
            <li>
              <a class="dropdown-item {% if room.slug == request.resolver_match.kwargs.room_slug %}active{% endif %}"
                 href="{% url 'room_incharge:room_dashboard' room_slug=room.slug %}"
                 onclick="if(window.IS_CAPACITOR||(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform())){event.preventDefault();window.location.href=this.href;}">
                {% if room.label %}<span style="font-size:0.75rem;font-weight:700;color:#6c63ff;margin-right:4px;">{{ room.label }}</span>{% endif %}{{ room.room_name }}
              </a>
            </li>
          {% endfor %}
        </ul>
      </div>
      {% endif %}

      <!-- Profile Avatar -->
      <div class="nb-avatar-wrap">
        <img src="https://images.unsplash.com/photo-1605106702734-205df224ecce?q=80&w=3000&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Profile">
      </div>
      
      <!-- Premium Direct Logout Button -->
      <a href="{% url 'core:logout' %}" 
         class="nb-logout-btn" 
         data-logout-url="{% url 'core:logout' %}" 
         data-home-url="{% url 'core:app_home' %}" 
         onclick="if(window.IS_CAPACITOR||(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform())){event.preventDefault();fetch(this.getAttribute('data-logout-url'),{method:'POST',headers:{'X-CSRFToken':document.cookie.match(/csrftoken=([^;]+)/)?.[1]||''}}).then(()=>window.location.href=this.getAttribute('data-home-url')).catch(()=>window.location.href=this.getAttribute('data-home-url'));}"
         title="Logout">
        <span class="material-symbols-outlined">logout</span>
        <span class="logout-text">Logout</span>
      </a>

    </div>
  </div>
</header>
