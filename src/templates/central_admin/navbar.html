{% load static %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');

  :root {
    --nb-h: 75px;
    --nb-bg: #ffffff;
    --nb-border: rgba(0, 0, 0, 0.07);
    --nb-shadow: 0 1px 0 rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
    --nb-accent: #6c63ff;
  }

  /* ── Fixed topbar shell ──────────────────────────────────────────── */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nb-h);
    background: var(--nb-bg);
    border-bottom: 1px solid var(--nb-border);
    box-shadow: var(--nb-shadow);
    z-index: 1001;
    font-family: 'DM Sans', sans-serif;
  }

  .header-content {
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 18px 0 14px;
    gap: 12px;
  }

  /* ── Hamburger ───────────────────────────────────────────────────── */
  .nb-menu-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px; height: 36px;
    background: #f4f6fb;
    border: 1px solid rgba(108, 99, 255, 0.16);
    border-radius: 9px;
    cursor: pointer;
    color: var(--nb-accent);
    flex-shrink: 0;
    transition: background 0.16s, box-shadow 0.16s, transform 0.14s;
    padding: 0;
  }
  .nb-menu-btn:hover {
    background: rgba(108, 99, 255, 0.09);
    box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.11);
    transform: scale(1.04);
  }
  .nb-menu-btn:active { transform: scale(0.96); }
  .nb-menu-btn .material-symbols-outlined {
    font-size: 20px;
    line-height: 1;
    user-select: none;
  }

  /* ── Logo ────────────────────────────────────────────────────────── */
  .logo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .logo img {
    height: 100px !important;
    width: auto !important;
    display: block !important;
    max-width: 320px !important;
    object-fit: contain !important;
    visibility: visible !important;
    opacity: 1 !important;
  }

  /* ── Mobile: shrink logo so it fits inside the 75px navbar ── */
  @media (max-width: 768px) {
    .logo img {
      height: 52px !important;
      max-width: 160px !important;
    }
    .header-content {
      padding: 0 12px 0 10px;
      gap: 8px;
    }
  }

  /* ── Spacer ──────────────────────────────────────────────────────── */
  .nb-spacer { flex: 1; }

  /* ── Right-side actions ──────────────────────────────────────────── */
  .nb-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Direct Premium Profile & Logout Button ─────────────────────── */
  .nb-avatar-wrap img {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #6c63ff;
    display: block;
  }
  .nb-logout-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: #fef2f2;
    border: 1px solid #fee2e2;
    border-radius: 12px;
    color: #dc2626;
    font-weight: 600;
    font-size: 13px;
    text-decoration: none !important;
    transition: all 0.2s ease;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .nb-logout-btn:hover {
    background: #dc2626;
    color: #ffffff;
    border-color: #dc2626;
    box-shadow: 0 4px 12px rgba(220, 38, 38, 0.25);
    transform: translateY(-1px);
  }
  .nb-logout-btn:active {
    transform: translateY(0);
  }
  .nb-logout-btn .material-symbols-outlined {
    font-size: 18px;
  }

  @media (max-width: 768px) {
    .nb-avatar-wrap {
      display: none; /* Hide avatar on mobile to save space */
    }
    .nb-logout-btn {
      padding: 8px;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      justify-content: center;
    }
    .nb-logout-btn .logout-text {
      display: none;
    }
  }

  /* ── Body offset so content isn't hidden under fixed header ─────── */
  body { padding-top: calc(var(--nb-h) + var(--sat, 0px)) !important; }
</style>

<header class="header" style="top: var(--sat, 0px);">
  <div class="header-content w-100">

    <button class="nb-menu-btn" onclick="if(typeof toggleSidebar==='function') toggleSidebar();" aria-label="Toggle sidebar">
      <span class="material-symbols-outlined">menu</span>
    </button>

    <!-- Logo -->
    <div class="logo" style="margin-left: -10px; padding-left: 0;">
      <img src="{% static 'images/blixtro.svg' %}" alt="Blixtro" style="height: 100px; width: auto; max-width: 320px; margin-left: 0;">
    </div>

    <div class="nb-spacer"></div>

    <!-- Right side -->
    <div class="nb-actions">
      <!-- Profile Avatar -->
      <div class="nb-avatar-wrap">
        <img src="https://images.unsplash.com/photo-1605106702734-205df224ecce?q=80&w=3000&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Profile">
      </div>
      
      <!-- Premium Direct Logout Button -->
      <a href="{% url 'core:logout' %}" 
         class="nb-logout-btn" 
         data-logout-url="{% url 'core:logout' %}" 
         data-home-url="{% url 'core:app_home' %}" 
         onclick="if(window.IS_CAPACITOR||(window.Capacitor&&window.Capacitor.isNativePlatform&&window.Capacitor.isNativePlatform())){event.preventDefault();fetch(this.getAttribute('data-logout-url'),{method:'POST',headers:{'X-CSRFToken':document.cookie.match(/csrftoken=([^;]+)/)?.[1]||''}}).then(()=>window.location.href=this.getAttribute('data-home-url')).catch(()=>window.location.href=this.getAttribute('data-home-url'));}"
         title="Logout">
        <span class="material-symbols-outlined">logout</span>
        <span class="logout-text">Logout</span>
      </a>
    </div>

  </div>
</header>
